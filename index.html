<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>pg-atlas</title>
    <script>
      // Apply theme synchronously before React mounts to prevent a
      // flash-of-unstyled-content on reload. Reads the same storage key
      // and media-query fallback as DashboardLayout.tsx.
      (function () {
        try {
          var stored = localStorage.getItem("pg-atlas-theme");
          var isDark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = isDark
            ? "dark"
            : "light";
        } catch (e) {
          /* no-op — React state remains the source of truth */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
