name: pga-frontend-prod
region: ams

domains:
  - domain: www.pgatlas.xyz
    type: PRIMARY
  - domain: pgatlas.xyz
    type: ALIAS

features:
  - buildpack-stack=ubuntu-24

static_sites:
  - environment_slug: node-js
    github:
      branch: main
      deploy_on_push: true
      repo: SCF-Public-Goods-Maintenance/pg-atlas-frontend
    name: pg-atlas-frontend
    source_dir: /

ingress:
  rules:
  - component:
      name: pg-atlas-frontend
    match:
      authority:
        exact: ""
      path:
        prefix: /

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
